<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you have dinner with me, my princess?💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Will you have dinner with me, my princess? 💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExOXZjM3liZHJ1MTdtMzJzZ2Zud2Z3aXRqdGJheGU2YXcxdXA3cGt5MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/zUPl5r33jdSfR4Zdqq/giphy.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="Vanessa Carlton - A Thousand Miles.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
